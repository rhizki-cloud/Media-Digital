<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SD SmartLearn — Belajar</title>
  <link rel="icon" type="image/svg+xml" href="aset/mascot-bimo.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar bg-white sticky-top">
    <div class="container py-2 d-flex align-items-center gap-2">
      <a class="navbar-brand fw-bold" href="home.html">⬅️ Dashboard</a>
      <span class="badge badge-soft" id="gradeBadge"></span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <a class="btn btn-outline-primary" href="profile.html" data-profile-btn>👧 Profil</a>
        <a class="btn btn-outline-primary" href="hadiah.html">🎁 Hadiah</a>
        <a class="btn btn-outline-primary" href="games.html">🎮 Games</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">
      <!-- LEFT: daftar mapel -->
      <div class="col-lg-4">
        <div class="panel">
          <h2 class="h4 mb-1" style="font-weight:900;">Pilih Mapel 📚</h2>
          <div class="text-muted mb-3">Klik kartu mapel ya!</div>
          <div id="subjectList" class="mapel-grid"></div>
        </div>
      </div>

      <!-- RIGHT: detail mapel -->
      <div class="col-lg-8">
        <div class="panel">
          <!-- header mapel -->
          <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
            <div class="me-auto">
              <h1 class="h4 mb-1" id="subjectTitle" style="font-weight:900;">Pilih mapel dulu ya 🙂</h1>
              <div class="text-muted" id="subjectDesc"></div>
            </div>
            <button class="btn btn-outline-primary big-btn" id="markDoneBtn" disabled>✅ Selesai</button>
          </div>

          <hr class="my-3"/>

          <!-- ✅ TOOLBAR TOMBOL (SATU) -->
          <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3" id="subjectToolbar">
            <!-- mode buttons -->
            <div class="btn-group" role="group" aria-label="Mode">
              <button type="button" class="btn btn-outline-primary mode-btn active" data-mode="materi">📘 Materi</button>
              <button type="button" class="btn btn-outline-primary mode-btn" data-mode="kuis">❓ Kuis</button>
              <button type="button" class="btn btn-outline-primary mode-btn" data-mode="mini">🎮 Mini</button>
            </div>

            <!-- action buttons (yang tampil tergantung mode) -->
            <div class="d-flex flex-wrap gap-2" id="modeActions">
              <!-- MINI actions -->            
              <a class="btn btn-outline-primary big-btn d-none" href="games.html" id="actionOpenGames">🎮 Games</a>
              <button type="button" class="btn btn-outline-primary big-btn d-none" id="actionConfetti">🎉 Tes Confetti</button>
              <button type="button" class="btn btn-outline-primary big-btn d-none" id="actionTip">💡 Minta Tips</button>
            </div>
          </div>

          <!-- panels -->
          <section id="panelMateri" class="section-soft">
            <h3 class="h5 mb-2" style="font-weight:900;">Ringkasan Materi 📘</h3>
            <div id="materialBox" class="materi-box"></div>
          </section>

          <section id="panelKuis" class="section-soft" style="display:none;">
            <h3 class="h5 mb-2" style="font-weight:900;">Kuis Cepat ❓</h3>
            <div id="quizBox"></div>
          </section>

          <section id="panelMini" class="section-soft" style="display:none;">
            <h3 class="h5 mb-2" style="font-weight:900;">Mini Latihan 🎮</h3>
            <div class="text-muted mb-2">Main latihan cepat ya!</div>
            <!-- tombolnya sudah dipindah ke toolbar biar jadi satu -->
            <div class="small text-muted">Gunakan tombol di atas untuk mulai ya 😄</div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="js/content-core.js"></script>

  <!-- load SEMUA kelas (paling gampang & anti error) -->
  <script src="js/content-kelas-1.js"></script>
  <script src="js/content-kelas-2.js"></script>
  <script src="js/content-kelas-3.js"></script>
  <script src="js/content-kelas-4.js"></script>
  <script src="js/content-kelas-5.js"></script>
  <script src="js/content-kelas-6.js"></script>
  
  <!-- builder kuis (kalau ini mengisi SD_CONTENT.kuis) -->
  <script src="js/content-quiz-builder.js"></script>
  
  <!-- app & halaman -->
  <script src="js/app.js"></script>
  <script src="js/subject.js"></script>
  <script src="js/subject-ui.js"></script>
